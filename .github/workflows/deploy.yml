name: Deploy Spring Boot Application

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: 17

      - name: Build Maven package (skip tests)
        run: mvn clean package -DskipTests

      - name: Upload JAR to server
        uses: appleboy/scp-action@v0.1.4
        with:
          host: 47.101.42.177  # 建议将主机信息也存入Secrets
          username: root # 建议使用非root用户
          key: ${{ secrets.SSH_PRIVATE_KEY }}  # 云服务器生成的私钥
          port: 22 # 可选，自定义SSH端口
          source: target/e_learning-0.0.1-SNAPSHOT.jar
          target: /var/www/html/springbootAndVue/e_learning

      - name: Build and run Docker container on server
        uses: appleboy/ssh-action@v0.1.7
        with:
          host: 47.101.42.177
          username: root2
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          script: |
            cd /var/www/html/springbootAndVue/e_learning
            docker build -t sb-e_learning .
            docker stop spring-e_learning || true
            docker rm spring-e_learning || true
            docker run -d --name spring-e_learning -p 9421:9421 --network blog sb-e_learning